<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ことばが育つ日記</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 40px;
      background: #f7f7f7;
    }
    textarea {
      width: 100%;
      height: 100px;
      font-size: 16px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
    }
    .result {
      margin-top: 20px;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>ことばが育つ日記</h2>

<textarea id="input" placeholder="今日ちょっとよかったこと"></textarea>
<br>
<button onclick="generate()">育てる</button>

<div class="result" id="output"></div>

<script>
async function generate() {
  const text = document.getElementById("input").value;

  const res = await fetch("/api/generate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  document.getElementById("output").innerHTML =
    "<p>" + data.result + "</p>" +
    "<p>🌸</p>";
}
</script>

</body>
</html>
